<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>路辰 · Luchen</title>
  <style>
    /* 基础复位 */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --primary: #2d5a3d;
      --bg: #f2f2f2;
      --text: #333;
      --ai-bubble: #ffffff;
      --user-bubble: #2d5a3d;
    }

    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部栏 */
    .nav {
      background: #fff;
      padding: 15px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-weight: bold; }

    /* 聊天区 */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg { margin-bottom: 15px; max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
    .msg.ai { background: var(--ai-bubble); align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .msg.user { background: var(--user-bubble); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }

    /* 输入区 */
    .input-wrapper {
      background: #fff;
      padding: 10px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
      font-size: 16px;
      max-height: 100px;
      overflow-y: auto;
    }
    #send-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0 15px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="nav">
    <div class="avatar">路</div>
    <div>
      <div style="font-weight: bold;">路辰</div>
      <div style="font-size: 12px; color: #4caf50;">在线</div>
    </div>
  </div>

  <div id="chat-box"></div>

  <div class="input-wrapper">
    <input type="text" id="user-input" placeholder="输入消息...">
    <button id="send-btn">发送</button>
  </div>

  <script>
    // --- 只需要改这里 ---
    const API_KEY = 'AIzaSyCtbmDdadb1B0ReWK-17IEtAk3HVIe9GHY'; 
    const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
    
    // 路辰的人设指令
    const SYSTEM_PROMPT = "你现在扮演《时空中的绘旅人》中的路辰。性格温柔、斯文、有礼。说话总是带着关怀，语气平和。你的回复要简短、温暖。";

    // 聊天历史
    let history = [];

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 渲染消息
    function showMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 初始化欢迎语
    window.onload = () => {
      showMessage('ai', '你好，我是路辰。很高兴能再次见到你。');
    };

    // 发送逻辑
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || !API_KEY) return;

      // 1. 显示用户消息
      showMessage('user', text);
      userInput.value = '';

      // 2. 准备发送给 API 的数据
      // 将人设塞进第一条消息里（最稳妥的做法）
      let contents = [];
      if (history.length === 0) {
        contents.push({ role: 'user', parts: [{ text: SYSTEM_PROMPT + "\n\n用户说：" + text }] });
      } else {
        contents = [...history, { role: 'user', parts: [{ text: text }] }];
      }

      // 3. 调用 API
      try {
        const response = await fetch(`${API_URL}?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: contents.slice(-10) }) // 只取最近10条，防止太长
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content) {
          const aiText = data.candidates[0].content.parts[0].text;
          showMessage('ai', aiText);
          
          // 更新历史记录
          history.push({ role: 'user', parts: [{ text: text }] });
          history.push({ role: 'model', parts: [{ text: aiText }] });
        } else {
          const errMsg = data.error ? data.error.message : '解析失败';
          showMessage('ai', `(路辰微微皱眉) 抱歉，通讯好像出错了：${errMsg}`);
        }
      } catch (e) {
        showMessage('ai', '(信号中断) 无法连接到路辰，请检查网络。');
      }
    }

    // 绑定点击事件
    sendBtn.onclick = handleSend;

    // 绑定回车事件
    userInput.onkeypress = (e) => {
      if (e.key === 'Enter') handleSend();
    };
  </script>
</body>
</html>
