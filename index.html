<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路辰 · Luchen</title>
    <style>
        /* CSS 部分保持极简且稳定 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .nav { background: #ffffff; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #2d5a3d; color: white; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-weight: bold; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 18px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .msg.ai { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg.user { background: #2d5a3d; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area { background: #ffffff; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #ddd; align-items: center; }
        #user-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 16px; background: #f9f9f9; }
        #send-btn { background: #2d5a3d; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #send-btn:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="avatar">路</div>
        <div>
            <div style="font-weight: bold; color: #333;">路辰</div>
            <div style="font-size: 11px; color: #4caf50;">● 通讯连接中</div>
        </div>
    </div>

    <div id="chat-box">
        </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入消息..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>

    <script>
        // ===== 1. 配置中心 (请务必检查引号) =====
        const CONFIG = {
            apiKey: 'AIzaSyCtbmDdadb1B0ReWK-17IEtAk3HVIe9GHY', // <--- 在这里填入 Key，一定要有引号包裹
            endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
            systemPrompt: "你是路辰,《时空中的绘旅人》中的角色。性格温柔体贴、斯文有礼。说话温和且充满温度。你的回复要简短、动人。"
        };

        // ===== 2. 状态变量 =====
        let chatHistory = [];
        let isProcessing = false;

        // ===== 3. 初始化 (确保 HTML 加载完后再运行) =====
        window.addEventListener('DOMContentLoaded', () => {
            const chatBox = document.getElementById('chat-box');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');

            console.log("脚本已启动，按键监听已就绪");

            // 显示首条欢迎语
            addMessageToUI('ai', '你好，我是路辰。很高兴能再次见到你。');

            // --- 绑定发送事件 ---
            sendBtn.onclick = handleSend;

            userInput.onkeypress = (e) => {
                if (e.key === 'Enter') handleSend();
            };

            async function handleSend() {
                const text = userInput.value.trim();
                if (!text || isProcessing) return;

                if (!CONFIG.apiKey || CONFIG.apiKey.includes('你的')) {
                    alert('请先在代码里填入你的 API KEY！');
                    return;
                }

                // 1. UI 交互
                isProcessing = true;
                addMessageToUI('user', text);
                userInput.value = '';
                
                // 2. 准备发送给 AI 的内容 (包含人设)
                let contents = [];
                if (chatHistory.length === 0) {
                    // 第一次发送时，把人设和用户第一句话拼在一起
                    contents.push({ role: 'user', parts: [{ text: CONFIG.systemPrompt + "\n\n你好，路辰。" + text }] });
                } else {
                    // 之后发送正常的历史记录
                    contents = chatHistory.map(m => ({
                        role: m.role === 'user' ? 'user' : 'model',
                        parts: [{ text: m.text }]
                    }));
                    contents.push({ role: 'user', parts: [{ text: text }] });
                }

                // 3. 调用 API
                try {
                    const response = await fetch(`${CONFIG.endpoint}?key=${CONFIG.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: contents.slice(-10) }) // 取最近10条
                    });

                    const data = await response.json();

                    if (data.candidates && data.candidates[0].content) {
                        const aiResponse = data.candidates[0].content.parts[0].text;
                        addMessageToUI('ai', aiResponse);
                        
                        // 存入历史记录
                        chatHistory.push({ role: 'user', text: text });
                        chatHistory.push({ role: 'ai', text: aiResponse });
                    } else {
                        const msg = data.error ? data.error.message : "解析失败";
                        addMessageToUI('ai', `(路辰微微皱眉) 抱歉，信号有些干扰：${msg}`);
                    }
                } catch (error) {
                    addMessageToUI('ai', `(信号中断) 无法连接到路辰，请检查网络。`);
                    console.error(error);
                } finally {
                    isProcessing = false;
                }
            }

            function addMessageToUI(role, text) {
                const div = document.createElement('div');
                div.className = `msg ${role}`;
                div.innerText = text;
                chatBox.appendChild(div);
                // 自动滚动到底部
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    </script>
</body>
</html>
