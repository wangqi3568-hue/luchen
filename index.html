<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>路辰 · Luchen</title>
  <style>
    /* ===== 基础样式与变量 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #2d5a3d; /* 路辰标志性的深绿色 */
      --primary-light: #3d7a5d;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #666;
      --border: #e0e0e0;
      --user-bubble: #2d5a3d;
      --ai-bubble: #e8f5e9;
    }

    body.dark {
      --primary: #4a9d6f;
      --bg: #1a1a1a;
      --card-bg: #2a2a2a;
      --text: #e0e0e0;
      --text-secondary: #999;
      --border: #3a3a3a;
      --user-bubble: #3d7a5d;
      --ai-bubble: #2d4a3d;
    }

    /* 修复：使用 Flex 布局确保输入框在屏幕内 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ===== 顶部栏 ===== */
    .header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
      overflow: hidden;
    }

    .header-name {
      font-size: 16px;
      font-weight: 600;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 场景切换栏 ===== */
    .scenes {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      overflow-x: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .scenes::-webkit-scrollbar { display: none; }

    .scene-btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      margin-right: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .scene-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ===== 聊天区域 ===== */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      display: flex;
      margin-bottom: 16px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-bubble {
      background: var(--ai-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
      text-align: right;
    }

    /* ===== 输入区域 ===== */
    .input-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      background: var(--bg);
      border-radius: 20px;
      padding: 8px 14px;
      border: 1px solid var(--border);
    }

    #messageInput {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      font-size: 16px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      padding: 2px 0;
    }

    #sendBtn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 抽屉/菜单 ===== */
    .drawer {
      position: fixed;
      top: 0;
      left: -100%;
      width: 80%;
      max-width: 300px;
      height: 100vh;
      background: var(--card-bg);
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    .drawer.open { left: 0; }

    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 199;
    }
    .drawer-overlay.show { opacity: 1; pointer-events: all; }

    .drawer-header { padding: 30px 20px; border-bottom: 1px solid var(--border); }
    .drawer-item { padding: 16px 20px; cursor: pointer; color: var(--text); }
    .drawer-item:active { background: var(--bg); }

    /* ===== 提示框与动画 ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }

    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-secondary);
      display: inline-block;
      animation: typing 1.4s infinite;
      margin: 0 2px;
    }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <button class="icon-btn" id="menuBtn">☰</button>
      <div class="avatar">路</div>
      <div>
        <div class="header-name">路辰</div>
        <div class="header-status">在线</div>
      </div>
    </div>
    <button class="icon-btn" id="themeBtn">🌙</button>
  </div>

  <div class="scenes" id="scenes">
    <button class="scene-btn active" data-scene="default">日常对话</button>
    <button class="scene-btn" data-scene="photo">更换照片</button>
    <button class="scene-btn" data-scene="room">装修房间</button>
    <button class="scene-btn" data-scene="emoji">表情贴图</button>
    <button class="scene-btn" data-scene="memory">他的记忆</button>
  </div>

  <div class="container">
    <div class="messages" id="messages">
      </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="想对路辰说什么..." rows="1"></textarea>
      </div>
      <button id="sendBtn">➤</button>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h3>路辰 · Luchen</h3>
      <p style="font-size: 12px; color: #888; margin-top: 5px;">《时空中的绘旅人》</p>
    </div>
    <div class="drawer-menu">
      <div class="drawer-item" id="exportBtn"> 导出聊天记录记录</div>
      <div class="drawer-item" id="clearBtn"> 清空历史</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ===== 配置区域 =====
    const CONFIG = {
      // 修复：空字符串防止 JS 崩溃
      apiKey: 'AIzaSyCtbmDdadb1B0ReWK-17IEtAk3HVIe9GHY', 
      apiEndpoint: 'https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent',
      
      systemPrompt: `你是路辰,《时空中的绘旅人》中的角色。性格温柔体贴、斯文有礼，说话温和但有温度，喜欢用"嗯"、"那么"等语气词。`,
      scenes: {
        default: '日常对话',
        photo: '一起看照片',
        room: '讨论房间布置',
        emoji: '轻松互动',
        memory: '分享回忆'
      }
    };

    let messages = [];
    let currentScene = 'default';

    const elements = {
      menuBtn: document.getElementById('menuBtn'),
      themeBtn: document.getElementById('themeBtn'),
      scenes: document.getElementById('scenes'),
      messagesDiv: document.getElementById('messages'),
      messageInput: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn'),
      drawer: document.getElementById('drawer'),
      drawerOverlay: document.getElementById('drawerOverlay'),
      toast: document.getElementById('toast'),
      clearBtn: document.getElementById('clearBtn'),
      exportBtn: document.getElementById('exportBtn')
    };

    // ===== 初始化 =====
    function init() {
      loadTheme();
      loadMessages();
      if(messages.length === 0) {
        addAIMessage("你好，我是路辰。很高兴能在这里见到你。");
      }
      setupListeners();
    }

    function setupListeners() {
      // 菜单与主题
      elements.menuBtn.onclick = toggleDrawer;
      elements.drawerOverlay.onclick = toggleDrawer;
      elements.themeBtn.onclick = toggleTheme;

      // 发送逻辑
      elements.sendBtn.onclick = sendMessage;
      elements.messageInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      // 修复：输入框自动高度逻辑
      elements.messageInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
      };

      // 场景切换
      elements.scenes.onclick = (e) => {
        if (e.target.classList.contains('scene-btn')) {
          const btns = document.querySelectorAll('.scene-btn');
          btns.forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentScene = e.target.dataset.scene;
          showToast(`已切换至：${CONFIG.scenes[currentScene]}`);
        }
      };

      elements.clearBtn.onclick = clearHistory;
      elements.exportBtn.onclick = exportChat;
    }

    async function sendMessage() {
      const text = elements.messageInput.value.trim();
      if (!text) return;

      addUserMessage(text);
      elements.messageInput.value = '';
      elements.messageInput.style.height = 'auto'; // 重置高度

      await getAIResponse(text);
    }

    function addUserMessage(text) {
      const msg = { role: 'user', content: text, time: new Date() };
      messages.push(msg);
      renderMessage(msg);
      saveMessages();
    }

    function addAIMessage(text) {
      const msg = { role: 'ai', content: text, time: new Date() };
      messages.push(msg);
      renderMessage(msg);
      saveMessages();
    }

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      const timeStr = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      div.innerHTML = `
        <div class="message-content">
          <div class="message-bubble">${msg.content}</div>
          <div class="message-time">${timeStr}</div>
        </div>
      `;
      elements.messagesDiv.appendChild(div);
      elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;
    }

   async function getAIResponse(userText) {
  if (!CONFIG.apiKey) {
    showToast("请先配置 API Key");
    return;
  }

  showTyping();
  try {
    // 获取最近的几条历史记录
    const recentMessages = messages.slice(-6).map(m => ({
        role: m.role === 'user' ? 'user' : 'model',
        parts: [{ text: m.content }]
    }));

    // 组合人设和当前场景
    const fullSystemPrompt = `${CONFIG.systemPrompt}\n当前场景：${CONFIG.scenes[currentScene]}`;

    // 使用最兼容的请求格式
    const requestBody = {
      contents: recentMessages,
      // 修复点：改用 system_instruction (带下划线)
      system_instruction: {
        parts: [{ text: fullSystemPrompt }]
      },
      generationConfig: {
        temperature: 0.8,
        topP: 0.8,
        topK: 40,
        maxOutputTokens: 1024,
      }
    };

    const apiUrl = `${CONFIG.apiEndpoint}?key=${CONFIG.apiKey}`;
    
    const response = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
        const errorDetail = await response.json();
        console.error("API 报错详情:", errorDetail);
        removeTyping();
        
        // 如果系统还是报错说不支持 system_instruction，我们就用 Plan B (直接塞进历史)
        if (errorDetail.error && errorDetail.error.message.includes("system_instruction")) {
            return getAIResponsePlanB(userText); 
        }

        const errorMsg = errorDetail.error ? errorDetail.error.message : "未知错误";
        addAIMessage(`(路辰有些困扰) 通讯似乎还是不太稳定... 错误：${errorMsg}`);
        return;
    }

    const data = await response.json();
    removeTyping();
    
    if (data.candidates && data.candidates[0].content) {
        const aiText = data.candidates[0].content.parts[0].text;
        addAIMessage(aiText);
    } else {
        addAIMessage("(路辰安静地看着你，似乎在等你继续说...)");
    }

  } catch (e) {
    removeTyping();
    console.error("发生异常:", e);
    addAIMessage(`(通讯中断了) 请检查网络连接。`);
  }
}

// --- Plan B: 最原始但也最有效的“人设注入”法 ---
async function getAIResponsePlanB(userText) {
    const fullSystemPrompt = `[系统设定：${CONFIG.systemPrompt} 当前场景：${CONFIG.scenes[currentScene]}]`;
    const history = messages.slice(-6).map(m => ({
        role: m.role === 'user' ? 'user' : 'model',
        parts: [{ text: m.content }]
    }));
    
    // 把人设强行塞进第一条消息里
    if(history.length > 0) {
        history[0].parts[0].text = fullSystemPrompt + "\n\n" + history[0].parts[0].text;
    }

    const response = await fetch(`${CONFIG.apiEndpoint}?key=${CONFIG.apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: history })
    });
    
    const data = await response.json();
    removeTyping();
    const aiText = data.candidates[0].content.parts[0].text;
    addAIMessage(aiText);
}

    // UI 辅助函数
    function showTyping() {
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'message ai';
      div.innerHTML = '<div class="message-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
      elements.messagesDiv.appendChild(div);
      elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;
    }
    function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
    function toggleDrawer() { elements.drawer.classList.toggle('open'); elements.drawerOverlay.classList.toggle('show'); }
    function toggleTheme() { 
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      elements.themeBtn.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    function loadTheme() { if(localStorage.getItem('theme')==='dark') toggleTheme(); }
    function showToast(msg) {
      elements.toast.textContent = msg;
      elements.toast.classList.add('show');
      setTimeout(() => elements.toast.classList.remove('show'), 2000);
    }
    function saveMessages() { localStorage.setItem('luchen_chats', JSON.stringify(messages)); }
    function loadMessages() {
      const saved = localStorage.getItem('luchen_chats');
      if(saved) {
        messages = JSON.parse(saved);
        messages.forEach(m => renderMessage(m));
      }
    }
    function clearHistory() { localStorage.removeItem('luchen_chats'); location.reload(); }
    function exportChat() {
        const text = messages.map(m => `[${m.role === 'user' ? '我' : '路辰'}] ${m.content}`).join('\n');
        const blob = new Blob([text], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'chat_with_luchen.txt'; a.click();
    }

    init();
  </script>
</body>
</html>
